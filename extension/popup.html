<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 300px;
      padding: 16px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
    }
    .status-dot.inactive {
      background: #6b7280;
    }
    .content-box {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 12px;
    }
    .content-title {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .content-value {
      font-size: 13px;
      color: white;
      word-break: break-word;
    }
    .btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    .btn:disabled {
      background: #4a5568;
      cursor: not-allowed;
      transform: none;
    }
    .hint {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-align: center;
      margin-top: 10px;
    }
    .step {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }
    .step-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">七</div>
    <div class="title">七牛内容助手</div>
  </div>

  <div class="status">
    <div class="status-dot inactive" id="status-dot"></div>
    <div class="status-text" id="status-text">等待从七牛App获取内容...</div>
  </div>

  <div class="content-box">
    <div class="content-title">当前内容</div>
    <div class="content-value" id="content-preview">暂无内容</div>
  </div>

  <button class="btn" id="fill-btn" disabled>
    一键填入
  </button>

  <div class="step">
    <div class="step-title">使用方法：</div>
    1. 在七牛App编辑并保存内容<br>
    2. 点击"一键发布"<br>
    3. 打开第三方平台后点击此按钮
  </div>

  <script src="popup.js"></script>
</body>
</html>
